services:
  gameboy-collection:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # App data (all persistent data)
      - ./data:/app/data

      # Analogue Pocket Library (read-only mount from SD card contents)
      - ./analogue-pocket-library:/analogue-pocket-library:ro   # Library/Images/GB|GBA|GBC/*.bin

      # Analogue Pocket Screenshots (optional, read-only)
      # - ./analogue-pocket-screenshots:/analogue-pocket-screenshots:ro
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=linux666
    restart: unless-stopped
