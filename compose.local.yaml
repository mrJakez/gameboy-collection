services:
  gameboy-collection:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # App-Daten (alle beweglichen Daten)
      - ./data:/app/data

      # Analog Pocket Library (read-only mount vom SD-Karten-Inhalt)
      - ./analogue-pocket-library:/analogue-pocket-library:ro   # Library/Images/GB|GBA|GBC/*.bin
      # Optional: ROM-Sammlung für Titelzuordnung aller Library-Bilder
      # - /pfad/zu/roms:/roms:ro
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=linux666
      - POCKET_LIBRARY_DIR=/analogue-pocket-library
      # - ROMS_DIR=/roms
    restart: unless-stopped
